<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="עמוד זמני לרשתות החברתיות של יקי בוזגלו.">
    <title>העמוד בפיתוח | יקי בוזגלו</title>
    <style>
      :root {
        --forest: #263f31;
        --green: #3e5c4a;
        --cream: #f8f6f1;
        --white: #ffffff;
        --ink: #2b2b2b;
        --muted: #66645d;
        --gold: #b8954b;
        --gold-strong: #a8642d;
        --line: rgba(62, 92, 74, .15);
        --shadow: 0 18px 50px rgba(38, 63, 49, .12);
      }

      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        background: var(--cream);
        color: var(--ink);
        font-family: Arial, "Helvetica Neue", sans-serif;
        line-height: 1.65;
      }

      a { color: inherit; }
      img { display: block; max-width: 100%; }
      h1, p { margin: 0; }

      .topbar {
        position: fixed;
        inset: 0 0 auto;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 10px clamp(16px, 4vw, 54px);
        background: rgba(248, 246, 241, .9);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--forest);
        font-weight: 900;
        text-decoration: none;
      }

      .brand img {
        width: 100px;
        height: 50px;
        object-fit: contain;
      }

      .button {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        padding: 10px 20px;
        border: 1px solid transparent;
        border-radius: 999px;
        background: var(--gold);
        color: var(--forest);
        font: inherit;
        font-weight: 900;
        text-decoration: none;
      }

      main {
        display: grid;
        place-items: center;
        padding: 110px clamp(18px, 5vw, 72px) 52px;
      }

      .notice {
        width: min(760px, 100%);
        padding: clamp(30px, 6vw, 58px);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(255, 255, 255, .86);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .eyebrow {
        margin-bottom: 12px;
        color: var(--gold-strong);
        font-weight: 900;
      }

      h1 {
        color: var(--forest);
        font-size: clamp(38px, 7vw, 68px);
        line-height: 1.05;
      }

      .notice p:last-of-type {
        max-width: 560px;
        margin: 18px auto 0;
        color: var(--muted);
        font-size: clamp(18px, 2vw, 22px);
        font-weight: 800;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 26px;
      }

      @media (max-width: 620px) {
        .brand span { display: none; }
      }
    </style>
    <link rel="stylesheet" href="assets/css/accessibility-widget.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">
        <img src="assets/images/logo.png" alt="לוגו יקי בוזגלו">
        <span>חזרה לדף הבית</span>
      </a>
      <a class="button" href="index.html#contact">יצירת קשר</a>
    </header>

    <main>
      <section class="notice" aria-labelledby="coming-soon-title">
        <p class="eyebrow">רשתות חברתיות</p>
        <h1 id="coming-soon-title">העמוד בפיתוח</h1>
        <p>בקרוב נעלה כאן קישור לעמוד הרשמי שלנו.</p>
        <div class="actions">
          <a class="button" href="index.html">חזרה לדף הבית</a>
        </div>
      </section>
    </main>
    <script src="assets/js/accessibility-widget.js"></script>
  </body>
</html>
